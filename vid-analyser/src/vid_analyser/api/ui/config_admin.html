<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ArgusAI Config</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
    <link rel="icon" type="image/png" sizes="32x32" href="/app/assets/favicon.png?v=2">
    <link rel="shortcut icon" href="/favicon.ico?v=2">
    <style>
      :root {
        color-scheme: light;
        font-family: "Iosevka", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        background: #f4efe7;
        color: #1d1d1b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(204, 135, 70, 0.24), transparent 28rem),
          linear-gradient(180deg, #f7f1e7 0%, #efe5d5 100%);
      }

      main {
        width: min(960px, calc(100vw - 2rem));
        margin: 2rem auto;
        padding: 1.5rem;
        border: 1px solid #c7b9a4;
        border-radius: 16px;
        background: rgba(255, 250, 242, 0.92);
        box-shadow: 0 18px 60px rgba(78, 50, 18, 0.12);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: clamp(1.6rem, 3vw, 2.3rem);
      }

      p {
        margin: 0 0 1rem;
        line-height: 1.5;
      }

      .toolbar {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        flex-wrap: wrap;
        margin: 1rem 0;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 0.7rem 1rem;
        background: #1d5b4f;
        color: #fff8ef;
        font: inherit;
        cursor: pointer;
      }

      button.secondary {
        background: #7a5c2e;
      }

      button:disabled {
        opacity: 0.65;
        cursor: wait;
      }

      #status {
        min-height: 1.5rem;
        margin: 0;
        font-size: 0.95rem;
      }

      #status.error {
        color: #a32020;
      }

      #status.success {
        color: #14532d;
      }

      .meta {
        margin: 0 0 1rem;
        color: #4d4437;
      }

      textarea {
        width: 100%;
        min-height: 65vh;
        padding: 1rem;
        border: 1px solid #bfae95;
        border-radius: 12px;
        background: #fffdf8;
        color: #1d1d1b;
        font: inherit;
        line-height: 1.45;
        resize: vertical;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Config Admin</h1>
      <p>View the active config and replace it by pasting raw JSON.</p>
      <p class="meta" id="meta">Loading current config...</p>
      <div class="toolbar">
        <button id="refresh" type="button" class="secondary">Reload</button>
        <button id="save" type="button">Save Config</button>
        <span id="status" aria-live="polite"></span>
      </div>
      <textarea id="config-editor" spellcheck="false" autocomplete="off"></textarea>
    </main>
    <script>
      const editor = document.getElementById("config-editor");
      const status = document.getElementById("status");
      const meta = document.getElementById("meta");
      const refreshButton = document.getElementById("refresh");
      const saveButton = document.getElementById("save");

      function setStatus(message, kind = "") {
        status.textContent = message;
        status.className = kind;
      }

      function setBusy(isBusy) {
        refreshButton.disabled = isBusy;
        saveButton.disabled = isBusy;
      }

      async function loadConfig() {
        setBusy(true);
        setStatus("Loading...");
        try {
          const response = await fetch("/app/api/config", {
            headers: { "Accept": "application/json" }
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || "Failed to load config");
          }
          editor.value = JSON.stringify(payload.config, null, 2);
          meta.textContent = `Current version: ${payload.id}`;
          setStatus("Loaded current config.", "success");
        } catch (error) {
          meta.textContent = "No config loaded.";
          setStatus(error.message || "Failed to load config.", "error");
        } finally {
          setBusy(false);
        }
      }

      async function saveConfig() {
        let parsed;
        try {
          parsed = JSON.parse(editor.value);
        } catch (error) {
          setStatus(`Invalid JSON: ${error.message}`, "error");
          return;
        }

        setBusy(true);
        setStatus("Saving...");
        try {
          const response = await fetch("/app/api/config", {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              "Accept": "application/json"
            },
            body: JSON.stringify({ config: parsed, source: "ui" })
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.detail || "Failed to save config");
          }
          editor.value = JSON.stringify(payload.config, null, 2);
          meta.textContent = `Current version: ${payload.id}`;
          setStatus(`Saved config version ${payload.id}.`, "success");
        } catch (error) {
          setStatus(error.message || "Failed to save config.", "error");
        } finally {
          setBusy(false);
        }
      }

      refreshButton.addEventListener("click", loadConfig);
      saveButton.addEventListener("click", saveConfig);
      loadConfig();
    </script>
  </body>
</html>
