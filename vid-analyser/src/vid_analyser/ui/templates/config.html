{% extends "base.html" %}

{% block content %}
<h1>Config</h1>

{% if saved %}
<div class="message">Config saved.</div>
{% endif %}

{% if config_record %}
<p><strong>Current version:</strong> {{ config_record.id }}</p>
<p><strong>Saved:</strong> {{ config_record.created_at }}</p>
{% else %}
<p class="muted">No config saved yet.</p>
{% endif %}

<form method="post" action="/ui/config">
  <textarea name="config_json" spellcheck="false">{{ config_json_pretty }}</textarea>
  <p>
    <button type="submit">Save config</button>
  </p>
</form>
{% endblock %}
