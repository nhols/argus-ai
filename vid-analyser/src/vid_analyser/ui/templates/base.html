<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <title>{{ page_title }} | ArgusAI</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fbfbfc;
        --fg: #111111;
        --muted: #666666;
        --link: #0b57d0;
        --border: #dddddd;
        --surface: #f5f5f5;
        --pill-bg: #f0f0f0;
        --success-bg: #edf7ed;
        --success-border: #b7dfb9;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111315;
          --fg: #f2f4f6;
          --muted: #b0b7bf;
          --link: #8ab4ff;
          --border: #2d3338;
          --surface: #1a1d20;
          --pill-bg: #20252a;
          --success-bg: #16311f;
          --success-border: #2e6d43;
        }
      }

      body { font-family: sans-serif; margin: 2rem auto; max-width: 1100px; padding: 0 1rem; color: var(--fg); background: var(--bg); }
      nav { margin-bottom: 1.5rem; }
      nav a { margin-right: 1rem; color: var(--link); text-decoration: none; }
      table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
      th, td { border-bottom: 1px solid var(--border); padding: 0.6rem; text-align: left; vertical-align: top; }
      code, pre, textarea { font-family: monospace; }
      pre { background: var(--surface); padding: 1rem; overflow-x: auto; border: 1px solid var(--border); }
      textarea { width: 100%; min-height: 28rem; background: var(--surface); color: var(--fg); border: 1px solid var(--border); }
      button { background: var(--surface); color: var(--fg); border: 1px solid var(--border); padding: 0.6rem 0.9rem; cursor: pointer; }
      .pill { display: inline-block; padding: 0.15rem 0.5rem; background: var(--pill-bg); border-radius: 999px; }
      .message { background: var(--success-bg); border: 1px solid var(--success-border); padding: 0.75rem 1rem; margin: 1rem 0; }
      .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
      .card { border: 1px solid var(--border); padding: 1rem; border-radius: 8px; background: var(--surface); }
      video { width: 100%; max-width: 100%; background: #000; }
      .json-block { margin-top: 1rem; }
      .muted { color: var(--muted); }
    </style>
  </head>
  <body>
    <nav>
      <a href="/ui/executions">Executions</a>
      <a href="/ui/config">Config</a>
    </nav>
    {% block content %}{% endblock %}
  </body>
</html>
